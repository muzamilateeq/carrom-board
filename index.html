<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My game</title>
    <style>
        canvas {
            touch-action: none;
        }

        body {
            margin: 0;
            background-image: url("./—Pngtree—dark blue galaxy starry background_321659.png");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            /* Keeps the game centered on screen */
        }


        #game-background {
            width: 500px;
            height: 100vh;
            background-image: url("./red-background-pic.avif");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #game-container {
            width: 300px;
            height: 300px;
            position: relative;
            border-radius: 4px;
            overflow: visible;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 10px 25px rgba(0, 0, 0, 0.5);
            background:
                radial-gradient(circle at center, rgba(254, 231, 197, 0.2) 0%, rgba(130, 81, 46, 0.3) 100%),
                repeating-linear-gradient(90deg, rgba(145, 103, 69, 0.05) 0px, rgba(145, 103, 69, 0.05) 1px, transparent 1px, transparent 12px),
                repeating-linear-gradient(0deg, rgba(110, 69, 38, 0.04) 0px, rgba(110, 69, 38, 0.04) 2px, transparent 2px, transparent 8px),
                linear-gradient(to bottom, #dec39f 0%, #ca9e74 100%);
        }

        #game-container canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #outside-container {
            width: 190px;
            height: 20px;
            background-color: #2a2c1c;
            border-radius: 50px;
            border: 3px solid #555;
            position: absolute;
            top: 90%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        #slider-knob {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #c56b0b;
            border-radius: 50%;
            cursor: grab;
            pointer-events: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
        }

        #slider-knob:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        #game-wrapper {
            width: 300px;
            margin: 40px auto;
        }

        /* Scoreboard Layout Fixes */
        #score-board {
            display: flex;
            justify-content: space-between;
            /* Changes spacing style to mirror left and right */
            align-items: center;
            /* Vertically aligns the middle elements */
            margin-bottom: 15px;
        }

        #playerone-image,
        #playertwo-image {
            display: flex;
            /* Enforced flexbox layout */
            flex-direction: column;
            align-items: center;
            gap: 5px;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 5px;
            transition: all 0.3s ease;
            flex: 1;
            /* Assigns equal width slots to both sides */
        }

        /* Balanced sizing for center element to keep left and right sections aligned */
        #coinsimg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 0 0 70px;
            text-align: center;
        }

        #coinsimg img {
            height: 40px;
            width: 40px;
        }

        #playerone-image img,
        #playertwo-image img {
            width: 45px;
            height: 45px;
        }

        .active-player {
            border-color: #ff5722 !important;
            background-color: rgba(255, 87, 34, 0.15);
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.4);
        }

        #playerone-name,
        #playertwo-name,
        #player1Score,
        #player2Score,
        #whitepice,
        #blackpice {
            color: aliceblue;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        #whitepice,
        #blackpice {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: 5px auto;
        }

        #whitepice {
            background: white;
            border: 2px solid #444;
        }

        #blackpice {
            background: black;
            border: 2px solid #666;
        }
    </style>
</head>

<body>


    <div id="game-background">
        <div id="game-wrapper">

            <div id="score-board">
                <div id="playerone-image">
                    <div id="playerone-name">YOU:</div>
                    <img src="./you.png">
                    <div style="display: flex;flex-direction: row; justify-content: center; align-items: center;">
                        <div id="whitepice"></div>
                        <img id="player1Queen" src="./images.jpg"
                            style="display:none;width:22px;height:22px;border-radius: 10px">
                    </div>
                    <div id="player1Score"><span id="p1score">0</span></div>


                </div>
                <div id="coinsimg">
                    <img src="./coins.png">
                    <span id="coinscore" style="color: white; font-size: 20px; font-weight: bold;">50</span>
                </div>

                <div id="playertwo-image">
                    <div id="playertwo-name">OPPONENT:</div>
                    <img src="./oponent-image.png">
                    <div style="display: flex;flex-direction: row; justify-content: center; align-items: center;">
                        <div id="blackpice"></div>
                        <img id="player2Queen" src="./images.jpg"
                            style="display:none;width:22px;height:22px;border-radius: 10px">
                    </div>
                    <div id="player2Score"><span id="p2score">0</span></div>

                </div>




            </div>

            <div id="game-container"></div>

            <div id="outside-container">
                <div id="slider-knob"></div>
            </div>

        </div>


        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="game.js"></script>
        <script>
            function resizeGame() {
                const bg = document.getElementById("game-background");
                const scale = Math.min(window.innerWidth / 520, window.innerHeight / 620, 1);
                bg.style.transform = `scale(${scale})`;
            }
            window.addEventListener("resize", resizeGame);
            resizeGame();
        </script>
    </div>

</body>

</html>
