<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loading/loading.css">
    <link rel="stylesheet" href="menu/menu.css">
    <link rel="stylesheet" href="board-selection/board-selection.css">
    <link rel="stylesheet" href="searching-player/searching-player.css">
    <link rel="stylesheet" href="result/result.css">
    <style>
        canvas {
            touch-action: none;
        }

        body {
            margin: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            /* Keeps the game centered on screen */
        }


        #game-background {
            position: relative;
            width: min(650px, 100vw);
            aspect-ratio: 1100 / 1672;
            height: 100vh;
            height: 100dvh;
            max-width: 100vw;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
        }

        @media (max-width: 768px),
        (max-aspect-ratio: 941/1672) {

            html,
            body {
                align-items: flex-start !important;
                justify-content: flex-start !important;
            }

            #game-background {
                width: 100vw !important;
                height: 100vh !important;
                height: 100dvh !important;
                aspect-ratio: auto !important;
                box-shadow: none !important;
                align-items: flex-start !important;
            }

            #menu-screen,
            #board-selection-screen,
            #searching-player-screen,
            #win-screen,
            #loading-screen {
                align-items: flex-start !important;
                top: 0 !important;
            }
        }

        #game-container {
            width: 340px;
            height: 340px;
            position: relative;
            overflow: hidden;
            border-radius: 6.5%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            /* Optional: add a nice shadow to the whole board */
        }

        #game-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 6.5%;
        }

        #outside-container {
            width: 215px;
            height: 20px;
            background-color: #412e2e;
            border-radius: 50px;
            border: 3px solid #555;
            position: relative;
            margin: 10px auto 0 auto;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
        }

        #slider-knob {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #d2ae87;
            border-radius: 50%;
            cursor: grab;
            pointer-events: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease;
        }

        #slider-knob:active {
            cursor: grabbing;
            transform: scale(1.1);
        }

        #game-wrapper {
            width: 340px;
            transform-origin: center center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-in-out;
            z-index: 10;
        }



        #game-wrapper[style*="opacity: 1"]+#game-page-background {
            opacity: 1 !important;
        }

        /* Scoreboard Layout Fixes */
        #score-board {
            display: flex;
            justify-content: space-between;
            /* Changes spacing style to mirror left and right */
            align-items: center;
            /* Vertically aligns the middle elements */
            margin-bottom: 15px;
        }

        #playerone-image,
        #playertwo-image {
            display: flex;
            /* Enforced flexbox layout */
            flex-direction: column;
            align-items: center;
            gap: 5px;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 5px;
            transition: all 0.3s ease;
            flex: 1;
            /* Assigns equal width slots to both sides */
        }

        /* Balanced sizing for center element to keep left and right sections aligned */
        #coinsimg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 0 0 70px;
            text-align: center;
        }

        #coinsimg img {
            height: 40px;
            width: 40px;
        }

        #playerone-image img,
        #playertwo-image img {
            width: 45px;
            height: 45px;
        }

        .active-player {
            border-color: #ff5722 !important;
            background-color: rgba(255, 87, 34, 0.15);
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.4);
        }

        #playerone-name,
        #playertwo-name,
        #player1Score,
        #player2Score,
        #whitepice,
        #blackpice {
            color: aliceblue;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        #whitepice,
        #blackpice {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: 5px auto;
        }

        #whitepice {
            background: white;
            border: 2px solid #444;
        }

        #blackpice {
            background: black;
            border: 2px solid #666;
        }

        /* Mobile specific styles to show same background as laptop */
        @media (max-width: 768px) {
            body {
                background-color: #000000;
            }

            #game-background {
                width: 100%;
                height: 100dvh !important;
                background-image: url("./Assets/menu/BG_.png");
            }

            #game-wrapper {
                width: 100% !important;
                height: 100dvh !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                align-items: center !important;
                transform: none !important;
                padding: 15px 15px calc(35px + env(safe-area-inset-bottom)) 15px !important;
                box-sizing: border-box !important;
            }

            #score-board {
                width: 100% !important;
                margin-bottom: 0 !important;
                padding-top: 10px;
            }

            #game-container {
                margin: auto 0 !important;
                /* scale board container down slightly if screen is very narrow */
                max-width: 92vw;
                max-height: 92vw;
            }

            #outside-container {
                /* Keep original size (215px) to prevent breaking the JS calculation math */
                width: 215px !important;
                margin: 0 auto !important;
            }
        }
    </style>
</head>

<body>


    <div id="game-background">
        <!-- Loading Screen Overlay -->
        <div id="loading-screen">
            <div class="loading-wrapper">
                <img src="./Assets/loading/Mockup.png" class="loading-mockup" alt="Loading Background">
                <!-- Mask to cover the mockup's static loading bar -->
                <div class="loading-bar-mask"></div>
                <div class="dynamic-loading-bar-container">
                    <img src="./Assets/loading/Loading-Bar.png" class="loading-bar-bg" alt="Loading Bar Frame">
                    <img src="./Assets/loading/Loading-Fill.png" id="loading-fill-img" class="loading-bar-fill"
                        alt="Loading Progress">
                </div>

            </div>
        </div>

        <!-- Menu Screen Overlay -->
        <div id="menu-screen">
            <div class="menu-wrapper">
                <!-- Game Logo Title -->
                <img src="./Assets/structure/Logo Title_.png" class="menu-logo" alt="Carrom Board Logo">

                <!-- Top Navigation Bar Mask -->
                <div id="menu-top-nav" class="menu-top-bar">
                    <!-- Top-Left Player Profile Overlay -->
                    <div class="user-name-container" id="menu-avatar-btn" title="Click to change profile picture">
                        <div class="user-name-content">
                            <span id="menu-player-name" class="player-name-text">Player 1</span>
                            <input type="text" id="menu-player-input" class="player-name-input" style="display: none;"
                                maxlength="10">
                            <img src="./Assets/menu/Edit-Name.png" id="menu-edit-btn" class="edit-name-icon"
                                alt="Edit Name">
                        </div>
                    </div>

                    <!-- Top-Right Coins Bar Overlay -->
                    <div id="menu-free-coins" class="menu-coins-container" style="cursor: pointer;"
                        title="Click for +5000 Free Coins!">
                        <div id="menu-coins-value" class="menu-coins-text">5000</div>
                        <div class="free-coins-plus-btn">+</div>
                    </div>
                </div>

                <!-- Interactive Left Free Coins Claim Area -->
                <div id="menu-free-coins" class="free-coins-overlay-btn" title="Claim Free Coins!"></div>

                <!-- Center Bottom Play Options -->
                <button id="menu-multiplayer-btn" class="menu-btn multiplayer-btn">
                    <img src="./Assets/menu/Multiplayer.png" class="btn-icon" alt="Multiplayer icon">
                    <span class="btn-text">MULTIPLAYER</span>
                </button>

                <button id="menu-local-btn" class="menu-btn local-btn">
                    <img src="./Assets/menu/Local-Mode.png" class="btn-icon" alt="Local icon">
                    <span class="btn-text">LOCAL</span>
                </button>

                <!-- Matchmaking Screen Overlay -->
                <div id="matchmaking-screen" class="matchmaking-overlay">
                    <div class="matchmaking-radar"></div>
                    <div id="matchmaking-status" class="matchmaking-status">FINDING OPPONENT...</div>
                </div>
            </div>
        </div>

        <!-- Board Selection Screen Overlay -->
        <div id="board-selection-screen">
            <div class="board-wrapper">

                <div class="board-top-nav">
                    <img src="./Assets/Board-slection/back-button.png" id="board-back-btn" class="board-back-btn"
                        alt="Back Button">
                    <div class="board-title">SELECT BOARD</div>
                    <div id="board-free-coins-btn" class="board-coins-container" style="cursor: pointer;"
                        title="Click for +5000 Free Coins!">
                        <div id="board-coins-value" class="board-coins-text">5000</div>
                        <div class="free-coins-plus-btn">+</div>
                    </div>
                </div>

                <div id="board-list-container" class="board-list">
                    <!-- Javascript will populate the boards here -->
                </div>
            </div>
        </div>

        <!-- Searching Player Screen Overlay -->
        <div id="searching-player-screen">
            <div class="searching-player-wrapper">
                <div class="sp-logo"></div>
                <div id="sp-status-text" class="sp-status-text">SEARCHING FOR PLAYERS...</div>

                <div class="sp-grid">
                    <!-- Left Player Column -->
                    <div class="sp-player-column">
                        <div class="sp-avatar-container">
                        </div>
                        <div id="sp-player-name-left" class="sp-player-name">PLAYER 1</div>
                        <div class="sp-fee-tab">
                            <div id="sp-fee-left" class="sp-fee-text">200</div>
                        </div>
                    </div>

                    <!-- VS Graphic -->
                    <div class="sp-vs"></div>

                    <!-- Right Player Column -->
                    <div class="sp-player-column">
                        <div id="sp-avatar-right" class="sp-avatar-container">
                        </div>
                        <div id="sp-player-name-right" class="sp-player-name">MATCHING...</div>
                        <div class="sp-fee-tab">
                            <div id="sp-fee-right" class="sp-fee-text">200</div>
                        </div>
                    </div>
                </div>

                <button id="sp-cancel-btn" class="sp-cancel-btn">
                    <span class="sp-cancel-text">CANCEL</span>
                </button>
            </div>
        </div>

        <div id="game-wrapper">

            <div id="score-board">
                <div id="playerone-image">
                    <div id="playerone-name">YOU:</div>
                    <img src="./you.png">
                    <div style="display: flex;flex-direction: row; justify-content: center; align-items: center;">
                        <div id="whitepice"></div>
                        <img id="player1Queen" src="./images.jpg"
                            style="display:none;width:22px;height:22px;border-radius: 10px">
                    </div>
                    <div id="player1Score"><span id="p1score">0</span></div>


                </div>
                <div id="coinsimg">
                    <img src="./coins.png">
                    <span id="coinscore" style="color: white; font-size: 20px; font-weight: bold;">50</span>
                </div>

                <div id="playertwo-image">
                    <div id="playertwo-name">OPPONENT:</div>
                    <img src="./oponent-image.png">
                    <div style="display: flex;flex-direction: row; justify-content: center; align-items: center;">
                        <div id="blackpice"></div>
                        <img id="player2Queen" src="./images.jpg"
                            style="display:none;width:22px;height:22px;border-radius: 10px">
                    </div>
                    <div id="player2Score"><span id="p2score">0</span></div>

                </div>




            </div>

            <div id="game-container"></div>

            <div id="outside-container">
                <div id="slider-knob"></div>
            </div>

            <!-- Win/Lose Screen Overlay -->
            <div id="win-screen">
                <div class="win-screen-wrapper">
                    <!-- Title Banner (You Win / You Lose) -->
                    <img id="result-title-img" class="result-title-img" src="Assets/Result/Youu Win_.png">

                    <!-- Players Row: Avatar + VS + Avatar -->
                    <div class="result-players-row">

                        <!-- Player 1 Column -->
                        <div class="result-player-column">
                            <!-- Avatar Circle -->
                            <div id="win-p1-avatar-box" class="result-avatar-box"></div>
                            <!-- Name Below Avatar -->
                            <div id="win-p1-name" class="result-player-name">Guest07b52</div>
                            <!-- ChatBox Bubble Below Name -->
                            <div class="result-chatbox-container">
                                <img src="Assets/Result/ChatBox.png" class="result-chatbox-bg">
                                <span class="result-chatbox-text">I want to play<br>again!</span>
                            </div>
                        </div>

                        <!-- VS Image -->
                        <div class="result-vs-container">
                            <img src="Assets/Result/VS.png" class="result-vs-img">
                        </div>

                        <!-- Player 2 Column -->
                        <div class="result-player-column">
                            <!-- Avatar Circle -->
                            <div id="win-p2-avatar-box" class="result-avatar-box"></div>
                            <!-- Name Below Avatar -->
                            <div id="win-p2-name" class="result-player-name">Opponent</div>
                            <!-- ChatBox Bubble Below Name -->
                            <div class="result-chatbox-container">
                                <img src="Assets/Result/ChatBox.png" class="result-chatbox-bg">
                                <span class="result-chatbox-text">I want to play<br>again!</span>
                            </div>
                        </div>
                    </div>

                    <!-- Coin Pile Image -->
                    <img src="Assets/Board-slection/Coin.png" class="result-coin-img">

                    <!-- Coins Amount in Dark Box -->
                    <div id="result-coins-amount" class="result-coins-amount">
                        <span id="result-subtitle-text" class="result-subtitle-text">400</span>
                    </div>

                    <!-- REMATCH Button -->
                    <div id="win-play-btn" class="result-play-btn">
                        <img src="Assets/Result/Blue Button_.png" class="result-play-btn-img">
                        <span class="result-play-btn-text">REMATCH</span>
                    </div>
                </div>
            </div>



            <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
            <script src="board-and-pieces/pieces-config.js"></script>
            <script src="board-and-pieces/board.js"></script>
            <script src="board-and-pieces/pieces.js"></script>
            <script src="game.js"></script>
            <script src="board-selection/board-selection.js" defer></script>
            <script src="searching-player/searching-player.js" defer></script>
            <script src="menu/menu.js" defer></script>
            <script src="result/result.js" defer></script>

            <!-- Loading Screen Logic -->
            <script src="loading/loading.js" defer></script>



            <script>
                function resizeGame() {
                    const wrapper = document.getElementById("game-wrapper");
                    if (!wrapper) return;

                    const bgContainer = document.getElementById("game-background");
                    const containerWidth = bgContainer ? bgContainer.clientWidth : window.innerWidth;
                    const containerHeight = bgContainer ? bgContainer.clientHeight : window.innerHeight;

                    // The maroon background simulates aspect-ratio: 941/1672
                    const maroonWidth = Math.min(containerWidth, containerHeight * (941 / 1672));

                    // The game wrapper base width is 340px, but the scoreboard is 115% (391px).
                    // We scale so the widest element (391px) fits into 95% of the maroon background width.
                    const scale = (maroonWidth * 0.95) / 391;

                    wrapper.style.transform = `scale(${scale})`;
                }
                window.addEventListener("resize", resizeGame);
                resizeGame();
            </script>
        </div>

        <!-- Game Page Background to match other screens -->
        <div id="game-page-background"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: flex-start; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.6s ease-in-out;">
            <div class="menu-wrapper" style="box-shadow: none;">
                <!-- Top Navigation Bar for Game Page -->
                <div class="menu-top-bar">
                    <!-- Simple Pause Button instead of Player Name -->
                    <div id="game-pause-btn" title="Pause Game"
                        style="position: absolute; top: 15.87%; left: 4%; height: 68.25%; aspect-ratio: 1; background: linear-gradient(135deg, #ff9e2c, #d34a00); border: 2.5px solid #ffffff; border-radius: 20%; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto; z-index: 15;">
                        <div
                            style="width: 35%; height: 45%; border-left: 3px solid white; border-right: 3px solid white; box-sizing: border-box;">
                        </div>
                    </div>

                    <div class="menu-coins-container">
                        <div class="menu-coins-text">5000</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings / Pause Overlay -->
        <div id="settings-overlay" class="settings-overlay">
            <div class="settings-popup">
                <img src="Assets/setting/popup_.png" class="settings-bg" alt="Settings Background">
                <div class="settings-content">

                    <div class="settings-title">• SETTINGS •</div>

                    <div class="settings-buttons-row">
                        <!-- Leave -->
                        <div class="settings-col">
                            <button id="leave-btn" class="settings-circle-btn">
                                <img src="Assets/setting/Button_.png" class="circle-btn-bg">
                                <img src="Assets/setting/Leave_.png" class="circle-btn-icon">
                            </button>
                            <div class="settings-label">Leave</div>
                        </div>
                        <!-- Sound -->
                        <div class="settings-col">
                            <button id="sound-toggle-btn" class="settings-circle-btn">
                                <img src="Assets/setting/Button_.png" class="circle-btn-bg">
                                <img src="Assets/setting/Sound On_.png" id="sound-icon" class="circle-btn-icon">
                            </button>
                            <div class="settings-label">Sound</div>
                        </div>
                        <!-- Resume -->
                        <div class="settings-col">
                            <button id="resume-btn" class="settings-circle-btn">
                                <img src="Assets/setting/Button_.png" class="circle-btn-bg">
                                <img src="Assets/setting/Resume_.png" class="circle-btn-icon">
                            </button>
                            <div class="settings-label">Resume</div>
                        </div>
                    </div>

                    <button id="save-settings-btn" class="settings-save-btn">
                        <img src="Assets/setting/Green Button_.png" class="save-btn-bg">
                        <span class="save-btn-text">SAVE</span>
                    </button>

                </div>
            </div>
        </div>

        <style>
            .settings-overlay {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0,0,0,0.72);
                z-index: 2000;
                display: flex;
                justify-content: center;
                align-items: center;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
            }
            .settings-overlay[style*="opacity: 1"] {
                pointer-events: auto;
            }

            /* Use container queries — popup scales with game board width */
            .settings-popup {
                position: relative;
                /* ~70% of the game-background container, capped at 280px */
                width: clamp(180px, 70%, 280px);
                aspect-ratio: 740 / 572;
                container-type: inline-size;
                transform: scale(0.75);
                transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .settings-overlay[style*="opacity: 1"] .settings-popup {
                transform: scale(1);
            }

            .settings-bg {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: fill;
            }

            .settings-content {
                position: relative;
                z-index: 2;
                width: 100%; height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-evenly;
                padding: 8% 5%;
                box-sizing: border-box;
            }

            /* All sizing now in cqw so it scales with popup width */
            .settings-title {
                color: #7a2e00;
                font-family: 'Impact', 'Arial Black', sans-serif;
                font-size: 6cqw;
                font-weight: bold;
                letter-spacing: 0.3cqw;
                margin: 0;
            }

            .settings-buttons-row {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
                gap: 5%;
                width: 90%;
            }

            .settings-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2%;
                flex: 1;
            }

            .settings-circle-btn {
                position: relative;
                background: transparent;
                border: none;
                cursor: pointer;
                width: 100%;
                aspect-ratio: 1;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                transition: transform 0.1s ease;
            }
            .settings-circle-btn:hover { transform: scale(1.06); filter: brightness(1.1); }
            .settings-circle-btn:active { transform: scale(0.94); }

            .circle-btn-bg {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: contain;
            }
            .circle-btn-icon {
                position: relative;
                z-index: 2;
                width: 52%;
                height: 52%;
                object-fit: contain;
                filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
            }

            .settings-label {
                color: #7a2e00;
                font-family: 'Arial', sans-serif;
                font-size: 4cqw;
                font-weight: bold;
            }

            .settings-save-btn {
                position: relative;
                background: transparent;
                border: none;
                cursor: pointer;
                width: 55%;
                aspect-ratio: 361 / 106;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                transition: transform 0.1s ease;
            }
            .settings-save-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
            .settings-save-btn:active { transform: scale(0.95); }

            .save-btn-bg {
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                object-fit: fill;
            }
            .save-btn-text {
                position: relative;
                z-index: 2;
                color: white;
                font-family: 'Impact', 'Arial Black', sans-serif;
                font-size: 5.5cqw;
                letter-spacing: 0.3cqw;
                text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            }

            /* Responsive pause button inside scoreboard */
            #game-pause-btn {
                flex-shrink: 0;
            }
        </style>
</body>
</html>
